<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <style>
   body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#3ab7a0,#69cbfb);
    font-family: Arial, sans-serif;
}

.card{
    background:#f4f7f6;
    padding:40px;
    border-radius:30px;
    width:320px;
    box-shadow: 0px 0px 15px 10px rgb(106, 255, 47);
}

.container{
    display:flex;
    align-items:center;
    gap:20px;
}

.icon{
    width:90px;
}

.content{
    display:flex;
    flex-direction:column;
}

.name{
    color:#d10000;
    font-size:22px;
    font-weight:bold;
    margin-bottom:5px;
}

audio{
    width:250px;
}
</style>

</head>
<body>

<div class="card">

<div class="container">

<img src="./Gif. animattion mp3.gif" class="icon">

<div class="content">
<div class="name">Asema</div>

<audio controls>
<source src="./cold_fire-bass-guitar-and-claps-260660.mp3" type="audio/mpeg">
</audio>

</div>

</div>

</div>
</body>
</html>
